services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: talent_pay_balance_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - balance_network
        depends_on:
            - postgres
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=laravel
            - DB_USERNAME=laravel_user
            - DB_PASSWORD=laravel_password

    nginx:
        image: nginx:alpine
        container_name: balance_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - balance_network
        depends_on:
            - app

    postgres:
        image: postgres:15-alpine
        container_name: postgres_database
        restart: unless-stopped
        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: laravel_user
            POSTGRES_PASSWORD: laravel_password
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - balance_network

networks:
    balance_network:
        driver: bridge

volumes:
    postgres_data:
